<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.app_name }}</title>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div id="global-busy-bar" class="busy-bar" aria-hidden="true"></div>
    <div id="global-busy-pill" class="busy-pill hidden" aria-live="polite">
        <span class="busy-dot"></span>
        <span id="global-busy-text">后端处理中...</span>
    </div>
    <header class="topbar">
        <div>
            <p class="eyebrow">Docker Multi-Host Control</p>
            <h1>{{ settings.app_name }}</h1>
        </div>
        <div class="topbar-right">
            <nav class="topnav">
                <a class="nav-chip" href="/">总览</a>
                {% if admin %}
                <a class="nav-chip" href="/hosts">宿主机</a>
                {% endif %}
                {% if admin and admin.get('is_root') %}
                <a class="nav-chip" href="/admins">管理员</a>
                {% endif %}
                {% if admin %}
                <form method="post" action="/logout">
                    <button class="nav-chip nav-button" type="submit">退出 {{ admin.get('account') }}</button>
                </form>
                {% elif platform_user %}
                <form method="post" action="/logout">
                    <button class="nav-chip nav-button" type="submit">退出 {{ platform_user.get('account') }}</button>
                </form>
                {% else %}
                <a class="nav-chip" href="/login">管理员登录</a>
                <a class="nav-chip" href="/user-login">使用者登录</a>
                {% endif %}
            </nav>
            <img class="topbar-logo" src="/static/img/scut-emblem.png" alt="华南理工大学校徽">
        </div>
    </header>
    <main class="layout">
        {% block content %}{% endblock %}
    </main>
    <section id="global-toast" class="toast hidden" aria-live="polite">
        <div id="global-toast-body" class="toast-body"></div>
    </section>
    <section id="global-feedback-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <div class="panel-head">
                <div>
                    <p class="eyebrow">操作反馈</p>
                    <h3 id="global-feedback-title">操作完成</h3>
                </div>
            </div>
            <div class="form-grid">
                <p id="global-feedback-message" class="wide muted"></p>
                <div id="global-feedback-progress-wrap" class="wide feedback-progress hidden">
                    <div class="progress-bar">
                        <div id="global-feedback-progress-fill" class="progress-fill"></div>
                    </div>
                    <p id="global-feedback-progress-text" class="muted">0%</p>
                </div>
                <label id="global-feedback-log-wrap" class="wide hidden">错误日志
                    <textarea id="global-feedback-log" rows="10" readonly></textarea>
                </label>
                <div class="wide modal-actions">
                    <button class="button secondary hidden" type="button" id="global-feedback-copy">复制日志</button>
                    <button class="button danger hidden" type="button" id="global-feedback-action">继续操作</button>
                    <button class="button" type="button" id="global-feedback-close">知道了</button>
                </div>
            </div>
        </div>
    </section>
    <script>
    (() => {
        const modal = document.getElementById("global-feedback-modal");
        const title = document.getElementById("global-feedback-title");
        const message = document.getElementById("global-feedback-message");
        const progressWrap = document.getElementById("global-feedback-progress-wrap");
        const progressFill = document.getElementById("global-feedback-progress-fill");
        const progressText = document.getElementById("global-feedback-progress-text");
        const logWrap = document.getElementById("global-feedback-log-wrap");
        const log = document.getElementById("global-feedback-log");
        const copy = document.getElementById("global-feedback-copy");
        const action = document.getElementById("global-feedback-action");
        const close = document.getElementById("global-feedback-close");
        const toast = document.getElementById("global-toast");
        const toastBody = document.getElementById("global-toast-body");
        const busyBar = document.getElementById("global-busy-bar");
        const busyPill = document.getElementById("global-busy-pill");
        const busyText = document.getElementById("global-busy-text");
        const logLines = [];
        let timer = null;
        let busyTimer = null;
        let redirectUrl = "";
        let reloadOnClose = false;
        let pendingAction = null;

        if (!modal) {
            return;
        }

        const showToast = (text, type) => {
            toast.classList.remove("hidden", "success", "error");
            toast.classList.add(type);
            toastBody.textContent = text;
            if (timer) {
                clearTimeout(timer);
            }
            timer = setTimeout(() => toast.classList.add("hidden"), 3600);
        };

        const showModal = (text, type = "success", errorLog = "", options = {}) => {
            redirectUrl = options.redirectUrl || "";
            reloadOnClose = Boolean(options.reloadOnClose);
            pendingAction = options.action || null;
            if (action) {
                action.textContent = pendingAction?.label || "继续操作";
                action.classList.toggle("hidden", !pendingAction);
                action.disabled = false;
                action.classList.remove("is-busy");
            }
            const preserveLog = Boolean(options.preserveLog);
            if (!preserveLog) {
                logLines.length = 0;
            }
            title.textContent = options.title || (type === "error" ? "操作失败" : "操作完成");
            message.textContent = text;
            if (progressWrap && progressFill && progressText) {
                const showProgress = Boolean(options.showProgress);
                progressWrap.classList.toggle("hidden", !showProgress);
                const progress = Number(options.progress || 0);
                progressFill.style.width = `${Math.max(0, Math.min(progress, 100))}%`;
                progressText.textContent = `${Math.round(Math.max(0, Math.min(progress, 100)))}%`;
            }
            if ((type === "error" && errorLog) || options.showLog) {
                if (errorLog) {
                    if (preserveLog && logLines.length) {
                        logLines.push(errorLog);
                        log.value = logLines.join("\n");
                    } else {
                        logLines.length = 0;
                        logLines.push(errorLog);
                        log.value = errorLog;
                    }
                } else {
                    log.value = logLines.join("\n");
                }
                logWrap.classList.remove("hidden");
                copy.classList.toggle("hidden", !log.value);
            } else {
                log.value = "";
                logWrap.classList.add("hidden");
                copy.classList.add("hidden");
            }
            modal.classList.remove("hidden");
            modal.setAttribute("aria-hidden", "false");
            showToast(text, type);
        };

        const showBusy = (text = "后端处理中...") => {
            if (busyText) {
                busyText.textContent = text;
            }
            busyBar?.classList.add("active");
            busyPill?.classList.remove("hidden");
            if (busyTimer) {
                clearTimeout(busyTimer);
            }
            busyTimer = setTimeout(() => {
                if (busyText) {
                    busyText.textContent = "后端仍在执行，请稍候...";
                }
            }, 1800);
        };

        const hideBusy = () => {
            if (busyTimer) {
                clearTimeout(busyTimer);
                busyTimer = null;
            }
            busyBar?.classList.remove("active");
            busyPill?.classList.add("hidden");
        };

        const appendLog = (line) => {
            if (!line) {
                return;
            }
            logLines.push(line);
            if (!modal.classList.contains("hidden")) {
                log.value = logLines.join("\n");
                logWrap.classList.remove("hidden");
                copy.classList.remove("hidden");
                log.scrollTop = log.scrollHeight;
            }
        };

        const setModalProgress = (progress, text = "") => {
            if (!progressWrap || !progressFill || !progressText) {
                return;
            }
            const value = Math.max(0, Math.min(Number(progress) || 0, 100));
            progressWrap.classList.remove("hidden");
            progressFill.style.width = `${value}%`;
            progressText.textContent = text || `${Math.round(value)}%`;
        };

        const readFeedbackStream = async (url, formData = new FormData(), options = {}) => {
            showModal(options.startMessage || "操作已开始，等待后端反馈...", "success", "", {
                title: options.title || "操作进行中",
                showProgress: true,
                showLog: true,
                progress: options.progress || 4,
                preserveLog: false,
                reloadOnClose: false
            });
            showBusy(options.startMessage || "后端正在执行...");
            appendLog(`${new Date().toLocaleTimeString()} ${options.startMessage || "开始执行"}`);
            const response = await fetch(url, {
                method: options.method || "POST",
                body: formData,
                headers: {
                    "X-Requested-With": "XMLHttpRequest",
                    "Accept": "application/x-ndjson"
                }
            });
            if (!response.ok || !response.body) {
                const text = await response.text();
                throw new Error(`HTTP ${response.status}\n${text.slice(0, 2000)}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";
            let lastEvent = null;
            while (true) {
                const { value, done } = await reader.read();
                if (done) {
                    break;
                }
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop() || "";
                for (const line of lines) {
                    if (!line.trim()) {
                        continue;
                    }
                    const event = JSON.parse(line);
                    lastEvent = event;
                    if (typeof event.progress === "number") {
                        setModalProgress(event.progress);
                    }
                    if (event.message) {
                        appendLog(`${new Date().toLocaleTimeString()} ${event.message}`);
                    }
                    if (event.event === "error") {
                        showModal(event.message || "操作失败。", "error", event.error_log || "", {
                            title: "操作失败",
                            showProgress: true,
                            progress: event.progress || 100,
                            showLog: true,
                            preserveLog: true,
                            reloadOnClose: false
                        });
                        return event;
                    }
                    if (event.event === "done") {
                        showModal(event.message || options.successMessage || "操作完成。", "success", "", {
                            title: "操作完成",
                            showProgress: true,
                            progress: event.progress || 100,
                            showLog: true,
                            preserveLog: true,
                            redirectUrl: event.redirect_url || options.redirectUrl || "",
                            reloadOnClose: false
                        });
                        return event;
                    }
                }
            }
            return lastEvent;
        };

        window.showGlobalFeedback = showModal;
        window.appendGlobalFeedbackLog = appendLog;
        window.setGlobalFeedbackProgress = setModalProgress;
        window.readGlobalFeedbackStream = readFeedbackStream;
        window.showGlobalBusy = showBusy;
        window.hideGlobalBusy = hideBusy;

        close.addEventListener("click", () => {
            modal.classList.add("hidden");
            modal.setAttribute("aria-hidden", "true");
            if (redirectUrl) {
                window.location.href = redirectUrl;
            } else if (reloadOnClose) {
                window.location.reload();
            }
        });

        copy.addEventListener("click", async () => {
            try {
                await navigator.clipboard.writeText(log.value);
                showToast("错误日志已复制。", "success");
            } catch (error) {
                log.focus();
                log.select();
                showToast("自动复制失败，已选中错误日志，请手动复制。", "error");
            }
        });

        action?.addEventListener("click", async () => {
            if (!pendingAction) {
                return;
            }
            const actionConfig = pendingAction;
            if (actionConfig.confirm && !window.confirm(actionConfig.confirm)) {
                return;
            }
            action.disabled = true;
            action.classList.add("is-busy");
            try {
                await readFeedbackStream(actionConfig.url, new FormData(), {
                    title: actionConfig.title || actionConfig.label || "继续操作",
                    startMessage: actionConfig.startMessage || "正在继续执行，请等待后端反馈...",
                    successMessage: actionConfig.successMessage || "操作完成。"
                });
            } catch (error) {
                showModal("继续操作请求发送失败，请检查网络或后端状态。", "error", String(error), {
                    title: "操作失败",
                    showProgress: true,
                    progress: 100
                });
            } finally {
                hideBusy();
                action.disabled = false;
                action.classList.remove("is-busy");
            }
        });

        document.querySelectorAll("form.confirm-ajax-form").forEach((form) => {
            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                const messageText = form.dataset.confirmMessage || "确认执行该操作？";
                if (!window.confirm(messageText)) {
                    return;
                }
                const submitButton = event.submitter || form.querySelector('button[type="submit"]');
                const originalText = submitButton ? submitButton.textContent : "";
                if (submitButton) {
                    submitButton.disabled = true;
                    submitButton.classList.add("is-busy");
                    submitButton.textContent = "处理中...";
                }
                showBusy("请求已发送，等待后端反馈...");
                try {
                    const response = await fetch(form.action, {
                        method: form.method || "POST",
                        body: new FormData(form),
                        headers: {
                            "X-Requested-With": "XMLHttpRequest",
                            "Accept": "application/json"
                        }
                    });
                    const responseText = await response.text();
                    let payload = null;
                    try {
                        payload = responseText ? JSON.parse(responseText) : {};
                    } catch (error) {
                        payload = {
                            ok: false,
                            message: `请求返回了非 JSON 内容，状态码 ${response.status}`,
                            error_log: `POST ${form.action}\nHTTP ${response.status}\n\n${responseText.slice(0, 2000)}`
                        };
                    }
                    if (Array.isArray(payload.logs)) {
                        payload.logs.forEach((line) => appendLog(line));
                    }
                    if (response.ok && payload.ok) {
                        showModal(
                            payload.message || "操作已完成。",
                            "success",
                            "",
                            {
                                redirectUrl: payload.redirect_url || form.dataset.successRedirect || "",
                                reloadOnClose: form.dataset.reloadOnClose !== "false"
                            }
                        );
                    } else {
                        const nextAction = payload.next_action ? {
                            ...payload.next_action,
                            title: payload.next_action.title || payload.next_action.label || "继续操作",
                            startMessage: payload.next_action.start_message || "正在继续移除宿主机记录...",
                            successMessage: payload.next_action.success_message || "宿主机记录移除完成。"
                        } : null;
                        showModal(payload.message || "操作失败。", "error", payload.error_log || "", {
                            action: nextAction
                        });
                    }
                } catch (error) {
                    showModal("请求发送失败，请检查网络或后端状态。", "error", String(error));
                } finally {
                    hideBusy();
                    if (submitButton) {
                        submitButton.disabled = false;
                        submitButton.classList.remove("is-busy");
                        submitButton.textContent = originalText;
                    }
                }
            });
        });
    })();
    </script>
</body>
</html>
